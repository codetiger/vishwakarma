name: Deploy to GitHub Pages

# Builds the height-tile pyramid (Python) and the voxel viewer (Vite), then
# publishes web/dist to GitHub Pages. The pyramid is generated here rather than
# committed, so the deploy always matches the current region/config.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; never cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/gen_pyramid/requirements.txt

      - name: Install pyramid generator deps
        run: pip install -r tools/gen_pyramid/requirements.txt

      # Cache the downloaded ETOPO bbox. Only the first run, or a region change in
      # config.toml, pays the download cost; later runs reuse it.
      - name: Cache DEM download
        uses: actions/cache@v4
        with:
          path: tools/gen_pyramid/_cache
          key: dem-${{ hashFiles('tools/gen_pyramid/config.toml') }}

      - name: Build height-tile pyramid
        working-directory: tools
        run: python -m gen_pyramid          # writes web/public/pyramid/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install viewer deps
        working-directory: web
        run: npm ci

      - name: Build viewer
        working-directory: web
        run: npm run build              # web/public/pyramid/ is copied into web/dist/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
